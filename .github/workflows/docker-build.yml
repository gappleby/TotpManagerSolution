name: Docker Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Optional: push to GitHub Container Registry ───────────────────────
      # Uncomment the steps below and set push: true in the build step.
      #
      # - name: Log in to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            totpmanager:latest
            totpmanager:${{ github.sha }}
          # To push to GHCR, replace the tags above with:
          # tags: |
          #   ghcr.io/${{ github.repository_owner }}/totpmanager:latest
          #   ghcr.io/${{ github.repository_owner }}/totpmanager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
