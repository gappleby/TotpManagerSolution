name: Docker Build

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    # Trigger only if changes are outside TotpManagerSpa and not markdown
    paths:
      - '**'               # all files
      - '!TotpManagerSpa/**'  # ignore this folder
      - '!**/*.md'         # ignore markdown files
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - '**'
      - '!TotpManagerSpa/**'
      - '!**/*.md'
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # needed for GHCR
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/totpmanager:latest
            ghcr.io/${{ github.repository_owner }}/totpmanager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
