name: Build & Push TotpManagerSpa Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'TotpManagerSpa/**'
  pull_request:
    branches: [main]
    paths:
      - 'TotpManagerSpa/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ignore changes that are only .md files — don't waste a build on docs edits.
      - name: Check for non-markdown changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            spa:
              - 'TotpManagerSpa/**'
              - '!TotpManagerSpa/**/*.md'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.spa == 'true'
        uses: docker/setup-buildx-action@v3

      # Pushes only on main branch commits; PR builds verify the image compiles but don't push.
      - name: Log in to GitHub Container Registry
        if: steps.filter.outputs.spa == 'true' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        if: steps.filter.outputs.spa == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/totp-spa
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - name: Build and push
        if: steps.filter.outputs.spa == 'true'
        uses: docker/build-push-action@v6
        with:
          context: TotpManagerSpa
          file: TotpManagerSpa/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
