name: Build & Publish TotpManagerSpa Docker Image

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push image to GHCR?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    branches: [main]
    paths:
      - 'TotpManagerSpa/**'
      - '!TotpManagerSpa/**/*.md'

  pull_request:
    branches: [main]
    paths:
      - 'TotpManagerSpa/**'
      - '!TotpManagerSpa/**/*.md'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/totp-spa

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: TotpManagerSpa
          file: TotpManagerSpa/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: |
            ${{
              github.event_name == 'push' ||
              (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
            }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
