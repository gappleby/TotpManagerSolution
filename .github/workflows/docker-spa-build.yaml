name: Build & Push TotpManagerSpa Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TotpManagerSpa/**'
      - '!TotpManagerSpa/**/*.md'
  pull_request:
    branches: [main]
    paths:
      - 'TotpManagerSpa/**'
      - '!TotpManagerSpa/**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only login when pushing to main
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: TotpManagerSpa
          file: TotpManagerSpa/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/totp-spa:latest
            ghcr.io/${{ github.repository_owner }}/totp-spa:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
